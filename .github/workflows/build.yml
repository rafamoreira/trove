name: Build

on:
  push:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o trove ./...
      - run: go test ./...
      - uses: actions/upload-artifact@v4
        with:
          name: trove-${{ github.sha }}
          path: trove 
