name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="trove-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -ldflags "-s -w -X main.version=${TAG}" -o "dist/${OUTPUT}" ./cmd/trove
      - uses: actions/upload-artifact@v4
        with:
          name: trove-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/trove-*

  build-vscode:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm run build
      - run: npx vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extensions/vscode/*.vsix

  release:
    runs-on: ubuntu-latest
    needs: [build-go, build-vscode]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum trove-* *.vsix > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/trove-*
            artifacts/*.vsix
            artifacts/checksums.txt
