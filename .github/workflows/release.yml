name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create releases

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Build for multiple platforms
      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/trove-linux-amd64   ./...
          GOOS=darwin  GOARCH=amd64 go build -o dist/trove-darwin-amd64  ./...
          GOOS=darwin  GOARCH=arm64 go build -o dist/trove-darwin-arm64  ./...
          GOOS=windows GOARCH=amd64 go build -o dist/trove-windows.exe   ./...

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
